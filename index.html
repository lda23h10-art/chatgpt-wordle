<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wordle Clone</title>

<style>
:root{
  --bg:#121213;
  --tile:#121213;
  --border:#3a3a3c;
  --text:#ffffff;
  --green:#538d4e;
  --yellow:#b59f3b;
  --gray:#3a3a3c;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}

h1{
  padding:16px;
  border-bottom:1px solid #2a2a2b;
  width:100%;
  text-align:center;
  letter-spacing:2px;
}

#board{
  margin-top:24px;
  display:grid;
  grid-template-rows:repeat(6, 1fr);
  gap:5px;
}

.row{
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:5px;
}

.tile{
  width:62px;
  height:62px;
  border:2px solid var(--border);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:2rem;
  font-weight:bold;
  text-transform:uppercase;
}

.correct{
  background:var(--green);
  border-color:var(--green);
}

.present{
  background:var(--yellow);
  border-color:var(--yellow);
}

.absent{
  background:var(--gray);
  border-color:var(--gray);
}

#keyboard{
  margin-top:28px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.key-row{
  display:flex;
  justify-content:center;
  gap:6px;
}

.key{
  height:58px;
  min-width:43px;
  border:none;
  border-radius:4px;
  background:#818384;
  color:white;
  font-weight:bold;
  cursor:pointer;
  padding:0 12px;
}

.key.large{
  min-width:65px;
}

#message{
  height:32px;
  margin-top:12px;
  font-weight:bold;
}
</style>
</head>
<body>

<h1>WORDLE</h1>

<div id="message"></div>
<div id="board"></div>
<div id="keyboard"></div>

<script>
const WORDS = [
  "APPLE","GRAPE","HOUSE","LIGHT","BRICK",
  "PLANT","MOUSE","TRAIN","SMILE","CLOUD",
  "SHARE","CRANE","STONE","WORLD","BRAIN"
];

const ANSWER = WORDS[Math.floor(Math.random() * WORDS.length)];

const ROWS = 6;
const COLS = 5;

let currentRow = 0;
let currentCol = 0;
let gameOver = false;

const guesses = Array.from({ length: ROWS }, () =>
  Array(COLS).fill("")
);

const board = document.getElementById("board");
const message = document.getElementById("message");

function createBoard() {
  for (let r = 0; r < ROWS; r++) {
    const row = document.createElement("div");
    row.className = "row";

    for (let c = 0; c < COLS; c++) {
      const tile = document.createElement("div");
      tile.className = "tile";
      tile.id = `tile-${r}-${c}`;
      row.appendChild(tile);
    }

    board.appendChild(row);
  }
}

function createKeyboard() {
  const layout = [
    "QWERTYUIOP",
    "ASDFGHJKL",
    "ENTERZXCVBNM⌫"
  ];

  const keyboard = document.getElementById("keyboard");

  layout.forEach(rowStr => {
    const row = document.createElement("div");
    row.className = "key-row";

    let keys = [];

    if (rowStr.includes("ENTER")) {
      keys = ["ENTER", ...rowStr.replace("ENTER","").replace("⌫","").split(""), "⌫"];
    } else {
      keys = rowStr.split("");
    }

    keys.forEach(keyVal => {
      const btn = document.createElement("button");
      btn.className = "key";
      btn.textContent = keyVal;

      if (keyVal === "ENTER" || keyVal === "⌫") {
        btn.classList.add("large");
      }

      btn.onclick = () => handleKey(keyVal);
      btn.id = `key-${keyVal}`;
      row.appendChild(btn);
    });

    keyboard.appendChild(row);
  });
}

function setMessage(text) {
  message.textContent = text;
}

function handleKey(key) {
  if (gameOver) return;

  if (key === "ENTER") {
    submitGuess();
    return;
  }

  if (key === "⌫" || key === "BACKSPACE") {
    deleteLetter();
    return;
  }

  if (/^[A-Z]$/.test(key)) {
    addLetter(key);
  }
}

function addLetter(letter) {
  if (currentCol >= COLS) return;

  guesses[currentRow][currentCol] = letter;

  const tile = document.getElementById(
    `tile-${currentRow}-${currentCol}`
  );

  tile.textContent = letter;
  currentCol++;
}

function deleteLetter() {
  if (currentCol === 0) return;

  currentCol--;

  guesses[currentRow][currentCol] = "";

  const tile = document.getElementById(
    `tile-${currentRow}-${currentCol}`
  );

  tile.textContent = "";
}

function submitGuess() {
  if (currentCol < COLS) {
    setMessage("Not enough letters");
    return;
  }

  const guess = guesses[currentRow].join("");

  let answerLetters = ANSWER.split("");
  let result = Array(COLS).fill("absent");

  for (let i = 0; i < COLS; i++) {
    if (guess[i] === ANSWER[i]) {
      result[i] = "correct";
      answerLetters[i] = null;
    }
  }

  for (let i = 0; i < COLS; i++) {
    if (result[i] === "correct") continue;

    const idx = answerLetters.indexOf(guess[i]);

    if (idx !== -1) {
      result[i] = "present";
      answerLetters[idx] = null;
    }
  }

  for (let i = 0; i < COLS; i++) {
    const tile = document.getElementById(
      `tile-${currentRow}-${i}`
    );

    tile.classList.add(result[i]);

    updateKeyColor(guess[i], result[i]);
  }

  if (guess === ANSWER) {
    setMessage("You Win!");
    gameOver = true;
    return;
  }

  currentRow++;
  currentCol = 0;

  if (currentRow === ROWS) {
    setMessage(`Answer: ${ANSWER}`);
    gameOver = true;
  } else {
    setMessage("");
  }
}

function updateKeyColor(letter, state) {
  const key = document.getElementById(`key-${letter}`);
  if (!key) return;

  if (key.classList.contains("correct")) return;

  if (state === "correct") {
    key.classList.remove("present","absent");
    key.classList.add("correct");
  } else if (
    state === "present" &&
    !key.classList.contains("present")
  ) {
    key.classList.add("present");
  } else if (
    state === "absent" &&
    !key.classList.contains("present")
  ) {
    key.classList.add("absent");
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter") handleKey("ENTER");
  else if (e.key === "Backspace") handleKey("BACKSPACE");
  else {
    const key = e.key.toUpperCase();
    if (/^[A-Z]$/.test(key)) handleKey(key);
  }
});

createBoard();
createKeyboard();
</script>

</body>
</html>
