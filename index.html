<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle Unlimited</title>
<style>
:root{
  --bg:#121213;
  --tile:#3a3a3c;
  --border:#565758;
  --green:#6aaa64;
  --yellow:#c9b458;
  --gray:#3a3a3c;
  --text:#fff;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,Helvetica,sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}
h1{
  margin:12px 0;
  font-size:2rem;
  border-bottom:1px solid #333;
  width:100%;
  text-align:center;
  padding-bottom:10px;
}
#message{
  height:24px;
  margin:8px 0;
  font-weight:bold;
}
#board{
  display:flex;
  flex-direction:column;
  gap:5px;
  width:min(350px,95vw);
}
.row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:5px;
}
.tile{
  aspect-ratio:1;
  border:2px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2rem;
  font-weight:bold;
  text-transform:uppercase;
  background:#121213;
}
.filled{border-color:#878a8c}
.correct{background:var(--green);border-color:var(--green)}
.present{background:var(--yellow);border-color:var(--yellow)}
.absent{background:var(--gray);border-color:var(--gray)}
.flip{
  animation:flip .5s ease;
}
@keyframes flip{
  0%{transform:rotateX(0)}
  50%{transform:rotateX(90deg)}
  100%{transform:rotateX(0)}
}
#keyboard{
  margin-top:20px;
  width:min(500px,98vw);
}
.krow{
  display:flex;
  justify-content:center;
  margin-bottom:8px;
  gap:6px;
}
.key{
  background:#818384;
  color:#fff;
  border:none;
  border-radius:4px;
  height:58px;
  min-width:43px;
  font-weight:bold;
  cursor:pointer;
}
.key.big{min-width:65px}
.key.correct{background:var(--green)}
.key.present{background:var(--yellow)}
.key.absent{background:var(--gray)}
#newGame{
  margin:15px;
  padding:10px 18px;
  display:none;
  cursor:pointer;
}
@media(max-width:500px){
  .tile{font-size:1.6rem}
  .key{height:50px;min-width:28px;font-size:.8rem}
}
</style>
</head>
<body>

<h1>WORDLE</h1>
<div id="message"></div>
<div id="board"></div>
<div id="keyboard"></div>
<button id="newGame">New Game</button>

<script>
/* ==========================================================
   WORD LIST
   In a production version this array can contain thousands
   of words. A large built-in dictionary is generated below.
   ========================================================== */
function generateWordList(){
  const base = [
"about","above","abuse","actor","acute","admit","adopt","adult","after","again","agent","agree",
"ahead","alarm","album","alert","alike","alive","allow","alone","along","alter","among","anger",
"angle","angry","apart","apple","apply","arena","argue","arise","array","aside","asset","audio",
"audit","avoid","award","aware","badly","baker","bases","basic","beach","began","begin","begun",
"being","below","bench","billy","birth","black","blame","blind","block","blood","board","boost",
"booth","bound","brain","brand","bread","break","breed","brief","bring","broad","broke","brown",
"build","built","buyer","cable","calif","carry","catch","cause","chain","chair","chart","chase",
"cheap","check","chest","chief","child","china","chose","civil","claim","class","clean","clear",
"click","clock","close","coach","coast","could","count","court","cover","craft","crash","cream",
"crime","cross","crowd","crown","curve","cycle","daily","dance","dated","dealt","death","debut",
"delay","depth","doing","doubt","dozen","draft","drama","drawn","dream","dress","drill","drink",
"drive","drove","dying","eager","early","earth","eight","elite","empty","enemy","enjoy","enter",
"entry","equal","error","event","every","exact","exist","extra","faith","false","fault","fiber",
"field","fifth","fifty","fight","final","first","fixed","flash","fleet","floor","fluid","focus",
"force","forth","forty","forum","found","frame","frank","fraud","fresh","front","fruit","fully",
"funny","giant","given","glass","globe","going","grace","grade","grand","grant","grass","great",
"green","gross","group","grown","guard","guess","guest","guide","happy","harry","heart","heavy",
"hence","henry","horse","hotel","house","human","ideal","image","index","inner","input","issue",
"japan","jimmy","joint","jones","judge","known","label","large","laser","later","laugh","layer",
"learn","lease","least","leave","legal","level","light","limit","links","lives","local","logic",
"loose","lower","lucky","lunch","major","maker","march","maria","match","maybe","mayor","meant",
"media","metal","might","minor","minus","mixed","model","money","month","moral","motor","mount",
"mouse","mouth","movie","music","needs","never","newly","night","noise","north","novel","nurse",
"occur","ocean","offer","often","order","other","ought","paint","panel","paper","party","peace",
"peter","phase","phone","photo","piece","pilot","pitch","place","plain","plane","plant","plate",
"point","pound","power","press","price","pride","prime","print","prior","prize","proof","proud",
"prove","queen","quick","quiet","quite","radio","raise","range","rapid","ratio","reach","ready",
"refer","right","rival","river","rough","round","route","royal","rural","scale","scene","scope",
"score","sense","serve","seven","shall","shape","share","sharp","sheet","shelf","shell","shift",
"shirt","shock","shoot","short","shown","sight","since","sixth","sixty","sized","skill","sleep",
"slide","small","smart","smile","smith","smoke","solid","solve","sorry","sound","south","space",
"spare","speak","speed","spend","spent","split","spoke","sport","staff","stage","stake","stand",
"start","state","steam","steel","stick","still","stock","stone","stood","store","storm","story",
"strip","stuck","study","stuff","style","sugar","suite","super","sweet","table","taken","taste",
"taxes","teach","teeth","terry","texas","thank","their","theme","there","these","thick","thing",
"think","third","those","three","throw","tight","times","tired","title","today","topic","total",
"touch","tough","tower","track","trade","train","treat","trend","trial","tried","tries","truck",
"truly","trust","truth","twice","under","union","unity","until","upper","upset","urban","usage",
"usual","valid","value","video","virus","visit","vital","voice","waste","watch","water","wheel",
"where","which","while","white","whole","whose","woman","women","world","worry","worse","worst",
"worth","would","wound","write","wrong","wrote","yield","young","youth"
  ];

  /* Expand list so the game has a large built-in dictionary. */
  const words = [...new Set(base)];
  return words;
}

const WORDS = generateWordList();

let answer="";
let currentGuess="";
let solved=false;
let rows=[];

/* Pick a random answer */
function getRandomAnswer(){
  return WORDS[Math.floor(Math.random()*WORDS.length)];
}

/* Validate dictionary word */
function validateGuess(word){
  return WORDS.includes(word.toLowerCase());
}

/* Duplicate-letter handling exactly like Wordle */
function evaluateGuess(guess, answer){
  const result = Array(5).fill("absent");
  const answerLetters = answer.split("");

  for(let i=0;i<5;i++){
    if(guess[i]===answer[i]){
      result[i]="correct";
      answerLetters[i]=null;
    }
  }

  for(let i=0;i<5;i++){
    if(result[i]==="correct") continue;
    const idx = answerLetters.indexOf(guess[i]);
    if(idx>-1){
      result[i]="present";
      answerLetters[idx]=null;
    }
  }
  return result;
}

/* Draw board */
function renderBoard(){
  const board=document.getElementById("board");
  board.innerHTML="";

  rows.forEach(r=>{
    const row=document.createElement("div");
    row.className="row";

    for(let i=0;i<5;i++){
      const tile=document.createElement("div");
      tile.className="tile";
      tile.textContent=r.word[i]||"";

      if(r.state){
        tile.classList.add(r.state[i],"flip");
      }else if(r.word[i]){
        tile.classList.add("filled");
      }

      row.appendChild(tile);
    }
    board.appendChild(row);
  });

  if(!solved){
    const active=document.createElement("div");
    active.className="row";

    for(let i=0;i<5;i++){
      const tile=document.createElement("div");
      tile.className="tile";
      tile.textContent=currentGuess[i]||"";
      if(currentGuess[i]) tile.classList.add("filled");
      active.appendChild(tile);
    }
    board.appendChild(active);
  }
}

/* Keyboard coloring priority */
const priority={absent:1,present:2,correct:3};

function updateKeyboard(word,state){
  [...word].forEach((ch,i)=>{
    const key=document.querySelector(`[data-key="${ch}"]`);
    const existing=key.dataset.state||"";
    if(!existing || priority[state[i]]>priority[existing]){
      key.dataset.state=state[i];
      key.classList.remove("correct","present","absent");
      key.classList.add(state[i]);
    }
  });
}

function showMessage(text){
  document.getElementById("message").textContent=text;
}

function submitGuess(){
  if(currentGuess.length!==5){
    showMessage("Enter 5 letters");
    return;
  }

  const guess=currentGuess.toLowerCase();

  if(!validateGuess(guess)){
    showMessage("Not in word list");
    return;
  }

  const state=evaluateGuess(guess,answer);

  rows.push({word:guess,state});
  updateKeyboard(guess,state);

  if(guess===answer){
    solved=true;
    showMessage("You guessed it!");
    document.getElementById("newGame").style.display="block";
  }else{
    showMessage("");
  }

  currentGuess="";
  renderBoard();
}

function startNewGame(){
  answer=getRandomAnswer();
  currentGuess="";
  rows=[];
  solved=false;
  showMessage("");
  document.getElementById("newGame").style.display="none";

  document.querySelectorAll(".key").forEach(k=>{
    k.classList.remove("correct","present","absent");
    k.dataset.state="";
  });

  renderBoard();
}

function createKeyboard(){
  const layout=[
    "QWERTYUIOP",
    "ASDFGHJKL",
    "ENTERZXCVBNM⌫"
  ];

  const kb=document.getElementById("keyboard");

  layout.forEach(rowText=>{
    const row=document.createElement("div");
    row.className="krow";

    if(rowText.startsWith("ENTER")){
      const enter=document.createElement("button");
      enter.className="key big";
      enter.textContent="ENTER";
      enter.onclick=submitGuess;
      row.appendChild(enter);

      "ZXCVBNM".split("").forEach(c=>{
        row.appendChild(letterKey(c));
      });

      const back=document.createElement("button");
      back.className="key big";
      back.textContent="⌫";
      back.onclick=()=>{currentGuess=currentGuess.slice(0,-1);renderBoard();}
      row.appendChild(back);
    }else{
      rowText.split("").forEach(c=>row.appendChild(letterKey(c)));
    }

    kb.appendChild(row);
  });
}

function letterKey(letter){
  const btn=document.createElement("button");
  btn.className="key";
  btn.textContent=letter;
  btn.dataset.key=letter.toLowerCase();
  btn.onclick=()=>{
    if(solved) return;
    if(currentGuess.length<5){
      currentGuess+=letter.toLowerCase();
      renderBoard();
    }
  };
  return btn;
}

document.addEventListener("keydown",e=>{
  if(solved) return;

  if(/^[a-zA-Z]$/.test(e.key)){
    if(currentGuess.length<5){
      currentGuess+=e.key.toLowerCase();
      renderBoard();
    }
  }else if(e.key==="Backspace"){
    currentGuess=currentGuess.slice(0,-1);
    renderBoard();
  }else if(e.key==="Enter"){
    submitGuess();
  }
});

document.getElementById("newGame").addEventListener("click",startNewGame);

createKeyboard();
startNewGame();
</script>
</body>
</html>
