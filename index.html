<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Enhanced Wordle</title>

<style>
:root{
    --bg:#121213;
    --tile:#3a3a3c;
    --absent:#3a3a3c;
    --present:#b59f3b;
    --correct:#538d4e;
    --text:#ffffff;
    --border:#565758;
}

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    flex-direction:column;
    align-items:center;
}

header{
    font-size:2rem;
    padding:10px;
    letter-spacing:2px;
}

#topbar{
    display:flex;
    gap:10px;
    align-items:center;
    margin-bottom:5px;
}

button{
    background:#565758;
    border:none;
    color:white;
    padding:6px 10px;
    cursor:pointer;
    border-radius:4px;
}

#board{
    display:grid;
    grid-template-rows: repeat(6, 1fr);
    gap:5px;
    margin-top:10px;
}

.row{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap:5px;
}

.tile{
    width:55px;
    height:55px;
    border:2px solid var(--border);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:1.5rem;
    font-weight:bold;
    text-transform:uppercase;
}

.correct{background:var(--correct);}
.present{background:var(--present);}
.absent{background:var(--absent);}

.flip{
    animation: flip 0.5s ease;
}

@keyframes flip{
    0%{transform:rotateX(0);}
    50%{transform:rotateX(90deg);}
    100%{transform:rotateX(0);}
}

.shake{
    animation: shake 0.3s;
}

@keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
}

#keyboard{
    margin-top:20px;
    display:flex;
    flex-direction:column;
    gap:6px;
}

.key-row{display:flex; gap:6px; justify-content:center;}

.key{
    padding:10px;
    background:#818384;
    border-radius:4px;
    min-width:28px;
    text-align:center;
    font-weight:bold;
    cursor:pointer;
}

.key.correct{background:var(--correct);}
.key.present{background:var(--present);}
.key.absent{background:#3a3a3c;}

#message{margin:10px;height:20px;}

#stats{
    font-size:0.8rem;
    margin-top:5px;
    opacity:0.8;
}

.confetti{
    position:fixed;
    width:6px;
    height:6px;
    background:red;
    top:0;
    animation: fall 2s linear forwards;
}

@keyframes fall{
    to{transform:translateY(100vh) rotate(360deg);}
}

@media(max-width:600px){
    .tile{width:42px;height:42px;}
}
</style>
</head>

<body>

<header>WORDLE+</header>

<div id="topbar">
<button onclick="startNewGame()">New</button>
<button onclick="toggleHardMode()">Hard Mode</button>
<button onclick="giveHint()">Hint</button>
</div>

<div id="message"></div>

<div id="board"></div>

<div id="keyboard"></div>

<div id="stats"></div>

<script>

/* =========================
   WORD LIST
========================= */
function generateWordList(){
    return [
        "apple","brick","crate","slate","grape","plane","shine","blink","crane","slump",
        "pride","flame","globe","swing","track","drive","point","water","sound","light",
        "earth","storm","cloud","plant","brain","heart","stone","grass","mouse","tiger",
        "zebra","horse","sheep","goose","crown","blade","flock","flint","spear","chair",
        "table","glass","watch","clock","spine","sugar","spice","berry","lemon","mango",
        "peach","olive","onion","dream","laugh","smile","brave","logic","magic","music",
        "novel","ocean","piano","queen","robot","snake","unity","vivid","whale","yacht",
        "zesty","blaze","crush","eagle","frost","giant","jewel","lunar","mirth","noble",
        "opal","prism","quest","rival","sword","torch","ultra","vapor","waltz","yield"
    ];
}

let WORDS = generateWordList();
let ANSWER = "";
let currentRow = 0;
let currentGuess = "";
let gameOver = false;
let hardMode = false;

const board = document.getElementById("board");
const keyboard = document.getElementById("keyboard");
const message = document.getElementById("message");
const statsBox = document.getElementById("stats");

let stats = JSON.parse(localStorage.getItem("stats") || `{
    "wins":0,"losses":0,"streak":0,"dist":[0,0,0,0,0,0]
}`);

function getDailyWord(){
    const today = new Date().toDateString();
    let seed = 0;
    for(let i=0;i<today.length;i++) seed += today.charCodeAt(i);
    return WORDS[seed % WORDS.length];
}

/* =========================
   INIT
========================= */
function startNewGame(){
    board.innerHTML="";
    keyboard.innerHTML="";
    message.textContent="";
    currentRow=0;
    currentGuess="";
    gameOver=false;

    ANSWER = getDailyWord();

    renderBoard();
    renderKeyboard();
    updateStats();
}

/* =========================
   BOARD
========================= */
function renderBoard(){
    for(let i=0;i<6;i++){
        const row=document.createElement("div");
        row.className="row";
        for(let j=0;j<5;j++){
            const t=document.createElement("div");
            t.className="tile";
            row.appendChild(t);
        }
        board.appendChild(row);
    }
}

/* =========================
   KEYBOARD
========================= */
function renderKeyboard(){
    const layout=["qwertyuiop","asdfghjkl","zxcvbnm"];

    layout.forEach(r=>{
        const row=document.createElement("div");
        row.className="key-row";
        r.split("").forEach(l=>{
            const k=document.createElement("div");
            k.className="key";
            k.textContent=l;
            k.onclick=()=>handleKey(l);
            row.appendChild(k);
        });
        keyboard.appendChild(row);
    });

    const bottom=document.createElement("div");
    bottom.className="key-row";

    const enter=document.createElement("div");
    enter.className="key";
    enter.textContent="Enter";
    enter.onclick=submitGuess;

    const del=document.createElement("div");
    del.className="key";
    del.textContent="Del";
    del.onclick=()=>handleKey("backspace");

    bottom.appendChild(enter);
    bottom.appendChild(del);
    keyboard.appendChild(bottom);
}

/* =========================
   INPUT
========================= */
document.addEventListener("keydown",(e)=>{
    if(gameOver) return;

    if(e.key==="Enter") submitGuess();
    else if(e.key==="Backspace") handleKey("backspace");
    else if(/^[a-z]$/i.test(e.key)) handleKey(e.key.toLowerCase());
});

function handleKey(k){
    const row=board.children[currentRow].children;

    if(k==="backspace"){
        currentGuess=currentGuess.slice(0,-1);
    }else if(currentGuess.length<5){
        currentGuess+=k;
    }

    for(let i=0;i<5;i++){
        row[i].textContent=currentGuess[i]||"";
    }
}

/* =========================
   VALIDATION
========================= */
function validate(word){
    return WORDS.includes(word);
}

/* =========================
   EVALUATE
========================= */
function evaluate(guess){
    const res=Array(5).fill("absent");
    const ans=ANSWER.split("");

    for(let i=0;i<5;i++){
        if(guess[i]===ans[i]){
            res[i]="correct";
            ans[i]=null;
        }
    }

    for(let i=0;i<5;i++){
        if(res[i]==="correct") continue;
        let idx=ans.indexOf(guess[i]);
        if(idx!==-1){
            res[i]="present";
            ans[idx]=null;
        }
    }
    return res;
}

/* =========================
   SUBMIT
========================= */
function submitGuess(){
    if(currentGuess.length!==5){
        shake();
        setMsg("5 letters required");
        return;
    }

    if(!validate(currentGuess)){
        shake();
        setMsg("Not in word list");
        return;
    }

    const res=evaluate(currentGuess);
    const row=board.children[currentRow].children;

    for(let i=0;i<5;i++){
        row[i].classList.add(res[i],"flip");
        updateKey(currentGuess[i],res[i]);
    }

    if(currentGuess===ANSWER){
        win();
        return;
    }

    currentRow++;
    currentGuess="";

    if(currentRow>=6){
        lose();
    }
}

/* =========================
   KEYBOARD UPDATE
========================= */
function updateKey(letter,status){
    document.querySelectorAll(".key").forEach(k=>{
        if(k.textContent===letter){
            if(status==="correct") k.className="key correct";
            else if(status==="present" && !k.classList.contains("correct"))
                k.classList.add("present");
            else if(status==="absent")
                k.classList.add("absent");
        }
    });
}

/* =========================
   GAME STATES
========================= */
function win(){
    gameOver=true;
    setMsg("You win!");
    stats.wins++;
    stats.streak++;
    stats.dist[currentRow]++;
    saveStats();
    confetti();
    updateStats();
}

function lose(){
    gameOver=true;
    setMsg("Word: "+ANSWER);
    stats.losses++;
    stats.streak=0;
    saveStats();
    updateStats();
}

/* =========================
   FEATURES
========================= */
function toggleHardMode(){
    hardMode=!hardMode;
    setMsg("Hard Mode: "+hardMode);
}

function giveHint(){
    setMsg("Hint: starts with "+ANSWER[0]);
}

function shake(){
    const row=board.children[currentRow];
    row.classList.add("shake");
    setTimeout(()=>row.classList.remove("shake"),300);
}

function confetti(){
    for(let i=0;i<30;i++){
        const c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=["red","yellow","green","blue"][i%4];
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),2000);
    }
}

/* =========================
   STATS
========================= */
function saveStats(){
    localStorage.setItem("stats",JSON.stringify(stats));
}

function updateStats(){
    statsBox.textContent=
        `Wins:${stats.wins} Losses:${stats.losses} Streak:${stats.streak}`;
}

function setMsg(m){
    message.textContent=m;
}

/* =========================
   START
========================= */
startNewGame();

</script>
</body>
</html>
